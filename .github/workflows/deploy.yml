name: 무중단 배포

on:
  workflow_dispatch:
    
  push:
    branches: [ main ]

jobs:
  # ── 1. WAS 서버 1 배포 ────────────────────────────────────
  deploy-was1:
    runs-on: ubuntu-latest
    steps:
      - name: Nginx에서 WAS1 제거
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NGINX_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec nginx sh -c 'cat <<EOF > /etc/nginx/conf.d/upstreams.inc
            upstream was_frontend {
              server ${{ secrets.WAS2_PRIVATE_IP }}:3000;
            }
            upstream was_backend {
              server ${{ secrets.WAS2_PRIVATE_IP }}:8080;
            }
            EOF'
            docker exec nginx nginx -s reload

      - name: WAS1 배포
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NGINX_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app &&
            # 1. 원격에서 최신 이미지(latest) 가져오기
            sudo docker-compose pull &&
            # 2. 기존 컨테이너와 네트워크 싹 밀기 (구버전 에러 방지 정석)
            sudo docker-compose down &&
            # 3. 새 이미지로 다시 띄우기
            sudo docker-compose up -d

      - name: WAS1 헬스체크
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.WAS1_PRIVATE_IP }}:8080/actuator/health)
            if [ "$STATUS" == "200" ]; then
              echo "✅ WAS1 정상 확인!"
              exit 0
            fi
            echo "대기 중... ($i/10)"
            sleep 10
          done
          echo "❌ WAS1 헬스체크 실패"
          exit 1

      - name: Nginx에 WAS1 복구
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NGINX_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec nginx sh -c 'cat <<EOF > /etc/nginx/conf.d/upstreams.inc
            upstream was_frontend {
              server ${{ secrets.WAS1_PRIVATE_IP }}:3000;
              server ${{ secrets.WAS2_PRIVATE_IP }}:3000;
            }
            upstream was_backend {
              server ${{ secrets.WAS1_PRIVATE_IP }}:8080;
              server ${{ secrets.WAS2_PRIVATE_IP }}:8080;
            }
            EOF'
            docker exec nginx nginx -s reload

  # ── 2. WAS 서버 2 배포 ────────────────────────────────────
  deploy-was2:
    needs: deploy-was1
    runs-on: ubuntu-latest
    steps:
      - name: Nginx에서 WAS2 제거
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NGINX_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec nginx sh -c 'cat <<EOF > /etc/nginx/conf.d/upstreams.inc
            upstream was_frontend {
              server ${{ secrets.WAS1_PRIVATE_IP }}:3000;
            }
            upstream was_backend {
              server ${{ secrets.WAS1_PRIVATE_IP }}:8080;
            }
            EOF'
            docker exec nginx nginx -s reload

      - name: WAS2 배포
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NGINX_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app &&
            # 1. 원격에서 최신 이미지(latest) 가져오기
            sudo docker-compose pull &&
            # 2. 기존 컨테이너와 네트워크 싹 밀기 (구버전 에러 방지 정석)
            sudo docker-compose down &&
            # 3. 새 이미지로 다시 띄우기
            sudo docker-compose up -d

      - name: WAS2 헬스체크
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.WAS1_PRIVATE_IP }}:8080/actuator/health)
            if [ "$STATUS" == "200" ]; then
              echo "✅ WAS2 정상 확인!"
              exit 0
            fi
            echo "대기 중... ($i/10)"
            sleep 10
          done
          echo "❌ WAS2 헬스체크 실패"
          exit 1

      - name: Nginx에 WAS2 복구
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NGINX_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec nginx sh -c 'cat <<EOF > /etc/nginx/conf.d/upstreams.inc
            upstream was_frontend {
              server ${{ secrets.WAS1_PRIVATE_IP }}:3000;
              server ${{ secrets.WAS2_PRIVATE_IP }}:3000;
            }
            upstream was_backend {
              server ${{ secrets.WAS1_PRIVATE_IP }}:8080;
              server ${{ secrets.WAS2_PRIVATE_IP }}:8080;
            }
            EOF'
            docker exec nginx nginx -s reload
